<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Decorative top-right sparkle -->
  <circle cx="410" cy="110" r="10" fill="#ffffff" opacity="0.6"/>
  <circle cx="440" cy="140" r="5" fill="#ffffff" opacity="0.4"/>

  <!-- 2x2 grid of MBTI dimension letters -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" text-anchor="middle" fill="#ffffff" filter="url(#shadow)">
    <!-- I / M -->
    <text x="168" y="220" font-size="128">I</text>
    <text x="344" y="220" font-size="128" opacity="0.5">M</text>
    <!-- S / B -->
    <text x="168" y="400" font-size="128" opacity="0.5">S</text>
    <text x="344" y="400" font-size="128">B</text>
  </g>

  <!-- Center divider cross -->
  <line x1="256" y1="100" x2="256" y2="412" stroke="#ffffff" stroke-width="4" opacity="0.25" stroke-linecap="round"/>
  <line x1="100" y1="256" x2="412" y2="256" stroke="#ffffff" stroke-width="4" opacity="0.25" stroke-linecap="round"/>
</svg>
